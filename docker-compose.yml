version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    env_file:
      - ./server/.env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
